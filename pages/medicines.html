<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Medicines - Medical Reminder</title>

<link rel="stylesheet" href="../style.css">


<style>

body{
    background:#f1f5f9;
}


/* Header */

.header{

    background:white;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);

}


.header h2{
    color:#2563eb;
}


.back{

    text-decoration:none;
    color:#2563eb;

}



/* Page */

.container{

    padding:40px 8%;

}



.title{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;

}



.add-btn{

    background:#2563eb;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    text-decoration:none;

}



/* Medicine cards */

.medicine-list{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;

}



.medicine-card{

    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);

}



.medicine-card h3{

    color:#2563eb;
    margin-bottom:15px;

}



.info{

    margin:8px 0;
    color:#555;

}



.actions{

    margin-top:20px;
    display:flex;
    gap:10px;

}



.edit,
.delete{

    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    color:white;
    cursor:pointer;
    border:none;

}



.edit{

    background:#22c55e;

}



.delete{

    background:#ef4444;

}



.empty{

    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;

}


</style>

</head>


<body>



<header class="header">

<h2>
💊 MediCare Reminder
</h2>


<a href="dashboard.html" class="back">
← Dashboard
</a>


</header>





<div class="container">
<input 
type="text"
id="searchMedicine"
placeholder="🔍 Search medicine..."
style="
width:100%;
padding:14px;
margin-bottom:25px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
">

<div class="title">

<h1>
My Medicines
</h1>


<button 
class="edit"
onclick="editMedicine(${index})">
Edit
</button>

</div>





<div class="medicine-list" id="medicineList">



</div>



</div>






<script>


let medicines =
JSON.parse(localStorage.getItem("medicines")) || [];


const medicineList =
document.getElementById("medicineList");



function displayMedicines(data){


medicineList.innerHTML="";


if(data.length === 0){

medicineList.innerHTML = `

<div class="empty">

<h2>
No medicines found
</h2>

</div>

`;

return;

}



data.forEach((medicine,index)=>{


medicineList.innerHTML += `


<div class="medicine-card">


<h3>
${medicine.name}
</h3>


<p class="info">
💊 Dosage: ${medicine.dosage}
</p>


<p class="info">
⏰ Time: ${medicine.time}
</p>


<p class="info">
📅 Frequency: ${medicine.frequency}
</p>


<p class="info">
📌 ${medicine.instructions}
</p>



<div class="actions">


<button 
class="edit"
onclick="editMedicine(${index})">

Edit

</button>



<button 
class="delete"
onclick="deleteMedicine(${index})">

Delete

</button>


</div>


</div>


`;

});


}




// Delete medicine

function deleteMedicine(index){


medicines.splice(index,1);


localStorage.setItem(
"medicines",
JSON.stringify(medicines)
);


displayMedicines(medicines);


}



// Edit medicine

function editMedicine(index){


localStorage.setItem(
"editIndex",
index
);


window.location.href =
"edit-medicine.html";


}




// Search medicine

document
.getElementById("searchMedicine")
.addEventListener("keyup",function(){



let value =
this.value.toLowerCase();



let filtered =
medicines.filter(medicine=>


medicine.name
.toLowerCase()
.includes(value)


);



displayMedicines(filtered);



});





displayMedicines(medicines);

</script>
function editMedicine(index){

localStorage.setItem(
"editIndex",
index
);

window.location.href="edit-medicine.html";

}


</body>

</html>
