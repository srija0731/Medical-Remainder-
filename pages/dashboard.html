<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Medical Reminder</title>

<link rel="stylesheet" href="../style.css">


<style>

body{
    background:#f1f5f9;
}


/* Header */

.dashboard-header{

    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 8%;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.08);

}


.dashboard-header h2{

    color:#2563eb;

}


.logout{

    background:#ef4444;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;

}



/* Dashboard */

.dashboard{

    padding:40px 8%;

}


.welcome{

    margin-bottom:30px;

}


.welcome h1{

    color:#0f172a;

}



.cards{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;

}



.card{

    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);

}


.card h3{

    color:#2563eb;
    margin-bottom:10px;

}


.number{

    font-size:35px;
    font-weight:bold;

}



/* Medicine */

.medicine-section{

    margin-top:40px;

}



.medicine-card{

    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;

}



.medicine-card h3{

    margin-bottom:5px;

}


.status{

    padding:8px 15px;
    border-radius:20px;
    background:#fef3c7;
    color:#92400e;

}


.taken{

    background:#dcfce7;
    color:#166534;

}



.add-btn{

    display:inline-block;
    margin-bottom:20px;
    background:#2563eb;
    color:white;
    padding:12px 25px;
    border-radius:10px;
    text-decoration:none;

}


</style>

</head>


<body>
<body>


<div class="dashboard-layout">


<!-- Sidebar -->

<aside class="sidebar">


<h2>
💊 MediCare
</h2>


<a href="dashboard.html">
🏠 Dashboard
</a>


<a href="medicines.html">
💊 Medicines
</a>


<a href="calendar.html">
📅 Calendar
</a>


<a href="history.html">
📜 History
</a>


<a href="profile.html">
👤 Profile
</a>


<a href="settings.html">
⚙ Settings
</a>


<a href="#" onclick="logout()">
🚪 Logout
</a>


</aside>





<!-- Main Content -->


<main class="main-content">



<div class="top-section">


<h1>
Welcome, <span id="username">User</span> 👋
</h1>


<p>
Stay healthy and never miss your medicines.
</p>


</div>





<div class="stats">



<div class="stat-card">

<h3>
Total Medicines
</h3>

<h1 id="totalMedicine">
0
</h1>

</div>




<div class="stat-card">

<h3>
Taken Today
</h3>

<h1 id="takenMedicine">
0
</h1>

</div>




<div class="stat-card">

<h3>
Pending
</h3>

<h1 id="pendingMedicine">
0
</h1>

</div>



</div>





<div class="quick-actions">


<a href="add-medicine.html">
➕ Add Medicine
</a>


<a href="medicines.html">
📋 View Medicines
</a>


</div>






<h2>
Today's Medicines
</h2>


<div id="medicineContainer">


</div>




</main>


</div>

<script src="../js/notification.js"></script>

</body>
<script src="../js/reminder.js"></script>
<script src="../js/auth.js"></script>

<script>

checkAuth();

</script>
<script>

displayMedicines();

</script>

</html>
<script>

let user =
JSON.parse(
localStorage.getItem("currentUser")
);


if(user){

document.getElementById("username").innerHTML =
user.name;

}



let medicines =
JSON.parse(
localStorage.getItem("medicines")
) || [];



document.getElementById("totalMedicine").innerHTML =
medicines.length;



let taken =
medicines.filter(
m=>m.status==="Taken"
).length;



document.getElementById("takenMedicine").innerHTML =
taken;



document.getElementById("pendingMedicine").innerHTML =
medicines.length - taken;



</script>
