<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medicine History - Medical Reminder</title>

<link rel="stylesheet" href="../style.css">


<style>

body{
    background:#f1f5f9;
}


/* Header */

.header{

    background:white;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);

}


.header h2{
    color:#2563eb;
}


.back{

    color:#2563eb;
    text-decoration:none;

}



/* Content */

.container{

    padding:40px 8%;

}


.container h1{

    margin-bottom:30px;

}



/* Table */

.history-box{

    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);

}



table{

    width:100%;
    border-collapse:collapse;

}



th{

    background:#2563eb;
    color:white;
    padding:15px;
    text-align:left;

}


td{

    padding:15px;
    border-bottom:1px solid #ddd;

}



.status{

    padding:7px 15px;
    border-radius:20px;
    font-size:14px;

}


.completed{

    background:#dcfce7;
    color:#166534;

}


.missed{

    background:#fee2e2;
    color:#991b1b;

}



/* Mobile */

@media(max-width:700px){

table{

font-size:13px;

}

}


</style>


</head>


<body>



<header class="header">

<h2>
💊 MediCare Reminder
</h2>


<a href="dashboard.html" class="back">
← Dashboard
</a>


</header>




<div class="container">


<h1>
Medicine History
</h1>



<div class="history-box">


<table>


<thead>

<tr>

<th>
Medicine
</th>

<th>
Date
</th>

<th>
Time
</th>

<th>
Status
</th>

</tr>

</thead>



<tbody id="historyTable">

</tbody>
</table>


</div>


</div>

<script>


let history =
JSON.parse(
localStorage.getItem("history")
) || [];



let table =
document.getElementById("historyTable");



if(history.length === 0){


table.innerHTML = `

<tr>

<td colspan="4">

No history available

</td>

</tr>

`;

}


else{


history.forEach(item=>{


table.innerHTML += `


<tr>


<td>
${item.name}
</td>


<td>
${item.date}
</td>


<td>
${item.time}
</td>


<td>

<span class="status completed">

${item.status} ✓

</span>

</td>


</tr>


`;



});


}


</script>
</body>

</html>
